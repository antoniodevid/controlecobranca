<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Visão Executiva — Faturamento M&amp;F</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://unpkg.com/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script src="https://unpkg.com/chart.js@4/dist/chart.umd.js"></script>
<style>
  :root {
    --bg: #081210;
    --surface: #0e1c15;
    --surface-2: #132419;
    --stroke: rgba(234,245,238,.07);
    --stroke-strong: rgba(164,232,69,.22);
    --verde: #1a944d;
    --lima: #a4e845;
    --glow: rgba(74,222,128,.32);
    --amber: #f0a44a;
    --text: #eaf5ee;
    --text-sec: #7e998b;
    --radius: 22px;
    --sidebar-w: 76px;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html { color-scheme: dark; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Inter', system-ui, sans-serif;
    font-size: 14px;
    min-height: 100vh;
    overflow-x: hidden;
  }
  /* Atmosfera ambiente: dois halos verdes fixos, como a luz difusa do vídeo */
  body::before, body::after {
    content: '';
    position: fixed;
    border-radius: 50%;
    filter: blur(120px);
    pointer-events: none;
    z-index: 0;
  }
  body::before {
    width: 560px; height: 560px;
    background: radial-gradient(circle, rgba(26,148,77,.16), transparent 70%);
    top: -180px; left: 22%;
  }
  body::after {
    width: 440px; height: 440px;
    background: radial-gradient(circle, rgba(164,232,69,.07), transparent 70%);
    bottom: -140px; right: -80px;
  }

  /* ── Sidebar ─────────────────────────── */
  .rail {
    position: fixed;
    top: 0; left: 0; bottom: 0;
    width: var(--sidebar-w);
    background: rgba(10,20,16,.85);
    backdrop-filter: blur(12px);
    border-right: 1px solid var(--stroke);
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 18px 0;
    gap: 8px;
    z-index: 20;
  }
  .rail-logo {
    width: 42px; height: 42px;
    display: grid; place-items: center;
    margin-bottom: 18px;
  }
  .rail-logo svg { display: block; }
  .rail-btn {
    width: 46px; height: 46px;
    border: none;
    border-radius: 14px;
    background: transparent;
    color: var(--text-sec);
    display: grid; place-items: center;
    cursor: pointer;
    transition: background .2s, color .2s, box-shadow .2s;
    text-decoration: none;
  }
  .rail-btn:hover { background: rgba(234,245,238,.05); color: var(--text); }
  .rail-btn.active {
    background: linear-gradient(135deg, rgba(26,148,77,.35), rgba(164,232,69,.14));
    color: var(--lima);
    box-shadow: 0 0 22px rgba(74,222,128,.22), inset 0 0 0 1px var(--stroke-strong);
  }
  .rail-spacer { flex: 1; }

  /* ── Layout principal ────────────────── */
  .main {
    position: relative;
    z-index: 1;
    margin-left: var(--sidebar-w);
    padding: 30px 34px 44px;
    max-width: 1440px;
  }
  .topbar {
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 16px;
    margin-bottom: 26px;
  }
  .topbar h1 {
    font-family: 'Sora', sans-serif;
    font-size: 26px;
    font-weight: 800;
    letter-spacing: -.5px;
  }
  .topbar h1 span { color: var(--lima); }
  .topbar-sub { color: var(--text-sec); font-size: 13px; margin-top: 4px; }
  .period-pills {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
    background: var(--surface);
    border: 1px solid var(--stroke);
    border-radius: 16px;
    padding: 5px;
  }
  .pill {
    border: none;
    background: transparent;
    color: var(--text-sec);
    font-family: 'Inter', sans-serif;
    font-size: 12.5px;
    font-weight: 600;
    padding: 8px 14px;
    border-radius: 12px;
    cursor: pointer;
    transition: background .2s, color .2s, box-shadow .2s;
  }
  .pill:hover { color: var(--text); }
  .pill.active {
    background: linear-gradient(135deg, var(--verde), #157a3f);
    color: #fff;
    box-shadow: 0 4px 16px rgba(26,148,77,.4);
  }

  /* ── Grid de cards ───────────────────── */
  .grid {
    display: grid;
    grid-template-columns: 330px repeat(2, minmax(0, 1fr)) 300px;
    grid-template-areas:
      "gauge kpi1 kpi2 abc"
      "gauge chart chart abc"
      "vert vert cli cli";
    gap: 16px;
    perspective: 1600px;
  }
  .card {
    background: linear-gradient(160deg, var(--surface-2), var(--surface));
    border: 1px solid var(--stroke);
    border-radius: var(--radius);
    padding: 20px;
    min-width: 0;
    opacity: 0;
    transform-style: preserve-3d;
    --rx: 0deg; --ry: 0deg; --lift: 0px;
    animation: cardIn .65s cubic-bezier(.22,.9,.36,1) forwards;
    transition: box-shadow .25s, border-color .25s;
  }
  .card.settled {
    animation: none;
    opacity: 1;
    transform: rotateX(var(--rx)) rotateY(var(--ry)) translateY(var(--lift));
    transition: transform .18s ease-out, box-shadow .25s, border-color .25s;
  }
  .card:hover {
    border-color: var(--stroke-strong);
    box-shadow: 0 18px 46px rgba(0,0,0,.5), 0 0 28px rgba(74,222,128,.09);
  }
  @keyframes cardIn {
    from { opacity: 0; transform: translateY(34px) rotateX(16deg) translateZ(-60px); }
    to { opacity: 1; transform: translateY(0) rotateX(0) translateZ(0); }
  }
  .card:nth-child(1) { animation-delay: .05s; }
  .card:nth-child(2) { animation-delay: .12s; }
  .card:nth-child(3) { animation-delay: .19s; }
  .card:nth-child(4) { animation-delay: .26s; }
  .card:nth-child(5) { animation-delay: .33s; }
  .card:nth-child(6) { animation-delay: .40s; }
  .card:nth-child(7) { animation-delay: .47s; }
  .card:nth-child(8) { animation-delay: .54s; }

  .card-label {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 1.2px;
    text-transform: uppercase;
    color: var(--text-sec);
    display: flex;
    align-items: center;
    gap: 7px;
    margin-bottom: 14px;
  }
  .card-label::before {
    content: '';
    width: 7px; height: 7px;
    border-radius: 50%;
    background: var(--lima);
    box-shadow: 0 0 8px var(--glow);
  }

  /* ── Gauge (herói) ───────────────────── */
  .gauge-card {
    grid-area: gauge;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 28px 22px;
  }
  .gauge-wrap { position: relative; width: 250px; height: 250px; margin: 8px 0 4px; }
  .gauge-wrap svg { transform: rotate(-90deg); overflow: visible; }
  .gauge-track { fill: none; stroke: rgba(234,245,238,.07); stroke-width: 14; }
  .gauge-arc {
    fill: none;
    stroke: url(#gaugeGrad);
    stroke-width: 14;
    stroke-linecap: round;
    filter: drop-shadow(0 0 10px var(--glow));
    transition: stroke-dashoffset 1.4s cubic-bezier(.3,.8,.3,1);
  }
  .gauge-ticks line { stroke: rgba(234,245,238,.14); stroke-width: 2; }
  .gauge-center {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
  }
  .gauge-value {
    font-family: 'Sora', sans-serif;
    font-size: 40px;
    font-weight: 800;
    letter-spacing: -1px;
    line-height: 1;
  }
  .gauge-unit { font-size: 12px; color: var(--text-sec); margin-top: 7px; font-weight: 600; }
  .gauge-pct {
    margin-top: 10px;
    font-family: 'Sora', sans-serif;
    font-size: 15px;
    font-weight: 700;
    color: var(--lima);
  }
  .gauge-foot {
    margin-top: 14px;
    font-size: 12.5px;
    color: var(--text-sec);
    text-align: center;
    line-height: 1.5;
  }
  .gauge-foot strong { color: var(--text); font-weight: 600; }

  /* ── KPIs ────────────────────────────── */
  .kpi { position: relative; overflow: hidden; display: flex; flex-direction: column; justify-content: space-between; min-height: 118px; }
  .kpi-1 { grid-area: kpi1; } .kpi-2 { grid-area: kpi2; }
  .kpi-top { display: flex; align-items: center; justify-content: space-between; }
  .kpi-icon {
    width: 40px; height: 40px;
    border-radius: 13px;
    display: grid; place-items: center;
    background: linear-gradient(135deg, rgba(26,148,77,.35), rgba(164,232,69,.12));
    color: var(--lima);
    box-shadow: inset 0 0 0 1px var(--stroke-strong);
  }
  .kpi-value {
    font-family: 'Sora', sans-serif;
    font-size: clamp(19px, 1.7vw, 24px);
    font-weight: 800;
    letter-spacing: -.6px;
    white-space: nowrap;
    margin-top: 12px;
  }
  .kpi-name { font-size: 12px; color: var(--text-sec); font-weight: 600; margin-top: 4px; }
  .spark {
    position: absolute;
    right: 16px; bottom: 14px;
    width: 42%; max-width: 120px; height: 30px;
    opacity: .95;
    pointer-events: none;
  }
  .spark polyline {
    fill: none;
    stroke: var(--lima);
    stroke-width: 2;
    stroke-linecap: round;
    stroke-linejoin: round;
    filter: drop-shadow(0 0 5px var(--glow));
  }

  /* ── Gráfico de evolução ─────────────── */
  .chart-card { grid-area: chart; min-height: 280px; }
  .chart-box { position: relative; height: 218px; }

  /* ── Verticais ───────────────────────── */
  .vert-card { grid-area: vert; }
  .vbar-row { display: grid; grid-template-columns: 190px 1fr 90px; align-items: center; gap: 12px; padding: 7px 0; }
  .vbar-name { font-size: 12.5px; font-weight: 600; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .vbar-track { height: 9px; border-radius: 6px; background: rgba(234,245,238,.06); overflow: hidden; }
  .vbar-fill {
    height: 100%;
    border-radius: 6px;
    background: linear-gradient(90deg, var(--verde), var(--lima));
    box-shadow: 0 0 10px var(--glow);
    width: 0;
    transition: width 1.1s cubic-bezier(.3,.8,.3,1);
  }
  .vbar-val { font-family: 'Sora', sans-serif; font-size: 12.5px; font-weight: 700; text-align: right; }

  /* ── Top clientes ────────────────────── */
  .cli-card { grid-area: cli; }
  .cli-row { display: flex; align-items: center; gap: 12px; padding: 8px 0; }
  .cli-avatar {
    width: 36px; height: 36px;
    flex-shrink: 0;
    border-radius: 12px;
    display: grid; place-items: center;
    font-family: 'Sora', sans-serif;
    font-size: 12px;
    font-weight: 800;
    color: var(--lima);
    background: rgba(26,148,77,.18);
    box-shadow: inset 0 0 0 1px var(--stroke-strong);
  }
  .cli-info { flex: 1; min-width: 0; }
  .cli-name { font-size: 12.5px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .cli-bar { height: 5px; border-radius: 4px; background: rgba(234,245,238,.06); margin-top: 5px; overflow: hidden; }
  .cli-bar span { display: block; height: 100%; border-radius: 4px; background: linear-gradient(90deg, var(--verde), var(--lima)); width: 0; transition: width 1.1s cubic-bezier(.3,.8,.3,1); }
  .cli-val { font-family: 'Sora', sans-serif; font-size: 12.5px; font-weight: 700; flex-shrink: 0; }

  /* ── ABC ─────────────────────────────── */
  .abc-card { grid-area: abc; display: flex; flex-direction: column; }
  .abc-box { position: relative; flex: 1; min-height: 200px; display: grid; place-items: center; }
  .abc-orbit-svg {
    position: absolute;
    inset: 0;
    margin: auto;
    width: min(100%, 252px);
    height: min(100%, 252px);
    pointer-events: none;
  }
  .abc-orbit-ring { transform-origin: 130px 130px; }
  .abc-box canvas {
    max-height: 224px;
    position: relative;
    z-index: 1;
    filter: drop-shadow(0 0 14px rgba(74,222,128,.20));
  }
  .abc-center {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    pointer-events: none;
    text-align: center;
    z-index: 2;
  }
  .abc-center-value { font-family: 'Sora', sans-serif; font-size: 21px; font-weight: 800; }
  .abc-center-label { font-size: 10px; letter-spacing: 1px; text-transform: uppercase; color: var(--text-sec); margin-top: 3px; }
  .abc-rows { display: flex; flex-direction: column; gap: 10px; margin-top: 16px; }
  .abc-row-top { display: flex; align-items: baseline; gap: 8px; font-size: 12px; }
  .abc-row-top b { font-family: 'Sora', sans-serif; font-weight: 700; color: var(--text); }
  .abc-row-n { color: var(--text-sec); font-weight: 600; }
  .abc-row-val { margin-left: auto; font-family: 'Sora', sans-serif; font-weight: 700; font-size: 12.5px; }
  .abc-row-pct { font-family: 'Sora', sans-serif; font-weight: 700; font-size: 12px; color: var(--lima); min-width: 44px; text-align: right; }
  .abc-bar { height: 5px; border-radius: 4px; background: rgba(234,245,238,.06); margin-top: 5px; overflow: hidden; }
  .abc-bar i {
    display: block;
    height: 100%;
    border-radius: 4px;
    width: 0;
    box-shadow: 0 0 9px var(--glow);
    transition: width 1.1s cubic-bezier(.3,.8,.3,1);
  }

  /* ── Macro 3D → dissipa → detalhe ────── */
  .has-macro { position: relative; }
  .has-macro .card-body {
    opacity: 0;
    transform: translateZ(-50px) scale(.94);
    pointer-events: none;
    transition: opacity .5s .16s, transform .62s .16s cubic-bezier(.22,.9,.36,1);
  }
  .has-macro.open .card-body { opacity: 1; transform: none; pointer-events: auto; }
  .macro {
    position: absolute;
    inset: 0;
    z-index: 3;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 9px;
    background: transparent;
    border: none;
    cursor: pointer;
    color: var(--text);
    font-family: inherit;
    transform-style: preserve-3d;
  }
  .macro-glyph {
    color: var(--lima);
    filter: drop-shadow(0 0 20px var(--glow));
    transform: translateZ(42px);
    animation: macroFloat 5s ease-in-out infinite;
  }
  @keyframes macroFloat {
    0%, 100% { transform: translateZ(42px) translateY(0); }
    50% { transform: translateZ(42px) translateY(-9px); }
  }
  .macro-value {
    font-family: 'Sora', sans-serif;
    font-size: 32px;
    font-weight: 800;
    letter-spacing: -.5px;
    transform: translateZ(56px);
    text-shadow: 0 0 26px rgba(74,222,128,.28);
  }
  .macro-name {
    font-size: 11px;
    letter-spacing: 1.4px;
    text-transform: uppercase;
    font-weight: 700;
    color: var(--text-sec);
    transform: translateZ(28px);
  }
  .macro-hint {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    font-size: 11px;
    color: var(--text-sec);
    opacity: .55;
    margin-top: 8px;
  }
  .open .macro {
    animation: dissipate .55s cubic-bezier(.5,0,.85,.4) forwards;
    pointer-events: none;
  }
  @keyframes dissipate {
    to { opacity: 0; transform: scale(1.55); filter: blur(18px); }
  }
  .mp {
    position: absolute;
    left: 50%; top: 44%;
    width: 7px; height: 7px;
    border-radius: 50%;
    background: var(--lima);
    box-shadow: 0 0 10px var(--glow);
    z-index: 4;
    pointer-events: none;
    transition: transform .8s cubic-bezier(.2,.7,.3,1), opacity .8s;
  }
  .macro-restore {
    margin-left: auto;
    border: none;
    background: rgba(234,245,238,.06);
    color: var(--text-sec);
    width: 26px; height: 26px;
    border-radius: 9px;
    display: grid;
    place-items: center;
    cursor: pointer;
    transition: color .2s, background .2s, box-shadow .2s;
  }
  .macro-restore:hover {
    color: var(--lima);
    background: rgba(26,148,77,.18);
    box-shadow: 0 0 12px rgba(74,222,128,.15);
  }

  .loading-veil {
    position: fixed;
    inset: 0;
    background: var(--bg);
    display: grid;
    place-items: center;
    z-index: 50;
    transition: opacity .4s;
  }
  .loading-veil.done { opacity: 0; pointer-events: none; }
  .spinner {
    width: 46px; height: 46px;
    border-radius: 50%;
    border: 3px solid rgba(164,232,69,.15);
    border-top-color: var(--lima);
    animation: spin .9s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── Ticker financeiro ───────────────── */
  .ticker {
    position: relative;
    overflow: hidden;
    margin: 0 0 18px;
    border: 1px solid var(--stroke);
    border-radius: 14px;
    background: var(--surface);
    padding: 9px 0;
    -webkit-mask-image: linear-gradient(90deg, transparent, #000 7%, #000 93%, transparent);
    mask-image: linear-gradient(90deg, transparent, #000 7%, #000 93%, transparent);
  }
  .ticker-track {
    display: flex;
    gap: 38px;
    width: max-content;
    animation: tick 42s linear infinite;
  }
  .ticker:hover .ticker-track { animation-play-state: paused; }
  @keyframes tick { to { transform: translateX(-50%); } }
  .tick-item {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    font-size: 12px;
    font-weight: 600;
    color: var(--text-sec);
    white-space: nowrap;
  }
  .tick-item b { color: var(--text); font-family: 'Sora', sans-serif; font-weight: 700; }
  .tick-up { color: var(--lima); }
  .tick-down { color: var(--amber); }

  /* ── Partículas financeiras ──────────── */
  .fin-particles { position: fixed; inset: 0; pointer-events: none; z-index: 0; overflow: hidden; }
  .fin-p {
    position: absolute;
    bottom: -50px;
    font-family: 'Sora', sans-serif;
    font-weight: 800;
    color: rgba(164,232,69,.13);
    text-shadow: 0 0 14px rgba(74,222,128,.22);
    animation: floatUp linear infinite;
    user-select: none;
    will-change: transform;
  }
  @keyframes floatUp {
    from { transform: translateY(0) rotate(0deg); opacity: 0; }
    12% { opacity: 1; }
    82% { opacity: .7; }
    to { transform: translateY(-115vh) rotate(20deg); opacity: 0; }
  }

  /* ── Anel orbital do medidor ─────────── */
  .gauge-orbit {
    fill: none;
    stroke: rgba(164,232,69,.20);
    stroke-width: 1.5;
    stroke-dasharray: 2 11;
    transform-origin: 125px 125px;
    animation: orbit 28s linear infinite;
  }
  @keyframes orbit { to { transform: rotate(360deg); } }

  @media (max-width: 1240px) {
    .grid {
      grid-template-columns: repeat(2, minmax(0, 1fr));
      grid-template-areas:
        "gauge gauge" "kpi1 kpi2"
        "chart chart" "vert vert" "cli abc";
    }
  }
  @media (max-width: 720px) {
    .main { margin-left: 0; padding: 20px 16px 90px; }
    .rail {
      top: auto; bottom: 0; right: 0; left: 0;
      width: auto; height: 66px;
      flex-direction: row;
      justify-content: center;
      padding: 0 12px;
      border-right: none;
      border-top: 1px solid var(--stroke);
    }
    .rail-logo, .rail-spacer { display: none; }
    .grid {
      grid-template-columns: 1fr;
      grid-template-areas: "gauge" "kpi1" "kpi2" "chart" "vert" "cli" "abc";
    }
    .vbar-row { grid-template-columns: 120px 1fr 84px; }
  }
  @media (prefers-reduced-motion: reduce) {
    .card { animation: none; opacity: 1; transform: none; }
    .card.settled { transform: none; }
    .gauge-arc, .vbar-fill, .cli-bar span, .abc-bar i { transition: none; }
    .ticker-track, .gauge-orbit, .macro-glyph { animation: none; }
    .fin-particles { display: none; }
    .has-macro .card-body { transition: none; }
    .open .macro { animation: none; opacity: 0; visibility: hidden; }
  }
</style>
</head>
<body>

<div class="loading-veil" id="veil"><div class="spinner"></div></div>
<div class="fin-particles" id="finParticles"></div>

<nav class="rail">
  <div class="rail-logo">
    <svg width="34" height="26" viewBox="0 0 34 26" fill="none" stroke="#a4e845" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
      <path d="M2 24 L9 8 L14 18 L20 3 L26 15 L32 24"/>
    </svg>
  </div>
  <button class="rail-btn active" title="Visão executiva">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><rect x="3" y="3" width="7" height="9" rx="2"/><rect x="14" y="3" width="7" height="5" rx="2"/><rect x="14" y="12" width="7" height="9" rx="2"/><rect x="3" y="16" width="7" height="5" rx="2"/></svg>
  </button>
  <a class="rail-btn" href="index.html" title="Voltar ao painel completo">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>

<script>
const SUPABASE_URL = 'https://odotkashembevyjekkzg.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9kb3RrYXNoZW1iZXZ5amVra3pnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE3MTIwMzYsImV4cCI6MjA5NzI4ODAzNn0.7iAChAtLxpwsaOy2jRsq77u3vwq_KvQWqPJkHGHK4I0';

const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY, {
  auth: { persistSession: true, autoRefreshToken: true }
});

let entries = [];
let period = 'all'; // 'all' | 'YYYY-MM'
let areaChart = null;
let abcChart = null;

const MESES = ['Jan','Fev','Mar','Abr','Mai','Jun','Jul','Ago','Set','Out','Nov','Dez'];
const fmtBRL = v => v.toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });
const fmtShort = v => {
  if (v >= 1e6) return 'R$ ' + (v / 1e6).toLocaleString('pt-BR', { maximumFractionDigits: 1 }) + 'M';
  if (v >= 1e3) return 'R$ ' + (v / 1e3).toLocaleString('pt-BR', { maximumFractionDigits: 0 }) + 'K';
  return fmtBRL(v);
};
const mesLabel = m => { const [y, mm] = m.split('-'); return MESES[parseInt(mm, 10) - 1] + '/' + y.slice(2); };

/* Count-up animado (respeita prefers-reduced-motion) */
const reduceMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
function countUp(el, target, format) {
  if (reduceMotion) { el.textContent = format(target); return; }
  const dur = 1100;
  const t0 = performance.now();
  // rAF não dispara em abas ocultas/ocluídas — garante o valor final de qualquer forma
  const guard = setTimeout(() => { el.textContent = format(target); }, dur + 300);
  function frame(t) {
    const p = Math.min((t - t0) / dur, 1);
    const eased = 1 - Math.pow(1 - p, 3);
    el.textContent = format(target * eased);
    if (p < 1) requestAnimationFrame(frame);
    else clearTimeout(guard);
  }
  requestAnimationFrame(frame);
}

/* ── Dados ─────────────────────────────── */
async function loadEntries() {
  const PAGE = 1000;
  let all = [];
  let from = 0;
  while (true) {
    const { data, error } = await sb
      .from('lancamentos')
      .select('mes, valor, cliente, vertical')
      .order('mes', { ascending: false })
      .order('id', { ascending: true })
      .range(from, from + PAGE - 1);
    if (error) throw error;
    if (!data || data.length === 0) break;
    all = all.concat(data);
    if (data.length < PAGE) break;
    from += PAGE;
  }
  entries = all;
}

function filtered() {
  return period === 'all' ? entries : entries.filter(e => e.mes === period);
}
function sumBy(list, key) {
  const map = {};
  list.forEach(e => { const k = e[key] || '—'; map[k] = (map[k] || 0) + Number(e.valor || 0); });
  return Object.entries(map).sort((a, b) => b[1] - a[1]);
}
function monthTotals() { return sumBy(entries, 'mes').sort((a, b) => a[0].localeCompare(b[0])); }

function computeABC(list) {
  const clients = sumBy(list, 'cliente');
  const total = clients.reduce((s, [, v]) => s + v, 0);
  const groups = { A: [], B: [], C: [] };
  let acc = 0;
  clients.forEach(([nome, v]) => {
    acc += v;
    const pct = acc / total * 100;
    if (pct <= 75 || groups.A.length === 0) groups.A.push([nome, v]);
    else if (pct <= 95) groups.B.push([nome, v]);
    else groups.C.push([nome, v]);
  });
  return { groups, total };
}

/* ── Render ────────────────────────────── */
function renderPills() {
  const months = monthTotals().map(([m]) => m);
  const pills = document.getElementById('pills');
  pills.innerHTML = '';
  const mk = (val, label) => {
    const b = document.createElement('button');
    b.className = 'pill' + (period === val ? ' active' : '');
    b.textContent = label;
    b.onclick = () => { period = val; renderAll(); };
    pills.appendChild(b);
  };
  mk('all', 'Totalidade');
  months.forEach(m => mk(m, mesLabel(m)));
}

function renderGauge(list) {
  const totals = monthTotals();
  const best = totals.reduce((mx, cur) => cur[1] > mx[1] ? cur : mx, ['', 0]);
  const fat = list.reduce((s, e) => s + Number(e.valor || 0), 0);
  const nMeses = period === 'all' ? Math.max(totals.length, 1) : 1;
  const mediaMensal = fat / nMeses;
  const pct = best[1] > 0 ? mediaMensal / best[1] * 100 : 0;

  const arc = document.getElementById('gaugeArc');
  const C = 2 * Math.PI * 96;
  arc.style.strokeDasharray = C;
  arc.style.strokeDashoffset = C;
  requestAnimationFrame(() => {
    arc.style.strokeDashoffset = C * (1 - Math.min(pct, 100) / 100);
  });

  countUp(document.getElementById('gaugeValue'), fat, fmtShort);
  document.getElementById('gaugePct').textContent = pct.toFixed(0) + '%' + (period === 'all' ? ' · média mensal' : '');
  document.getElementById('gaugeFoot').innerHTML = period === 'all'
    ? `Média mensal de <strong>${fmtShort(mediaMensal)}</strong> frente ao melhor mês, <strong>${mesLabel(best[0])}</strong> (${fmtShort(best[1])}).`
    : `Este mês representa <strong>${pct.toFixed(0)}%</strong> do melhor mês, <strong>${mesLabel(best[0])}</strong> (${fmtShort(best[1])}).`;
}

function renderKpis(list) {
  const fat = list.reduce((s, e) => s + Number(e.valor || 0), 0);
  const n = list.length;
  countUp(document.getElementById('kpiFat'), fat, fmtShort);
  countUp(document.getElementById('kpiLanc'), n, v => Math.round(v).toLocaleString('pt-BR'));
}

function renderArea() {
  const totals = monthTotals();
  const ctx = document.getElementById('areaChart').getContext('2d');
  const grad = ctx.createLinearGradient(0, 0, 0, 220);
  grad.addColorStop(0, 'rgba(164,232,69,.32)');
  grad.addColorStop(1, 'rgba(26,148,77,0)');
  const labels = totals.map(([m]) => mesLabel(m));
  const data = totals.map(([, v]) => v);
  const ptColors = totals.map(([m]) => (period !== 'all' && m === period) ? '#a4e845' : 'rgba(164,232,69,.55)');
  const ptRadius = totals.map(([m]) => (period !== 'all' && m === period) ? 6 : 3.5);

  if (areaChart) areaChart.destroy();
  areaChart = new Chart(ctx, {
    type: 'line',
    data: { labels, datasets: [{
      data,
      borderColor: '#a4e845',
      borderWidth: 2.5,
      backgroundColor: grad,
      fill: true,
      tension: .42,
      pointBackgroundColor: ptColors,
      pointBorderColor: 'transparent',
      pointRadius: ptRadius,
      pointHoverRadius: 7
    }]},
    options: {
      responsive: true,
      maintainAspectRatio: false,
      animation: reduceMotion ? false : { duration: 1200, easing: 'easeOutQuart' },
      plugins: {
        legend: { display: false },
        tooltip: {
          backgroundColor: '#132419',
          borderColor: 'rgba(164,232,69,.25)',
          borderWidth: 1,
          titleColor: '#eaf5ee',
          bodyColor: '#a4e845',
          padding: 12,
          cornerRadius: 12,
          displayColors: false,
          callbacks: { label: c => fmtBRL(c.parsed.y) }
        }
      },
      scales: {
        x: { grid: { display: false }, ticks: { color: '#7e998b', font: { family: 'Inter', size: 11 } } },
        y: {
          grid: { color: 'rgba(234,245,238,.05)' },
          ticks: { color: '#7e998b', font: { family: 'Inter', size: 11 }, callback: v => fmtShort(v) }
        }
      }
    }
  });
}

function renderVerticais(list) {
  const rows = sumBy(list, 'vertical').slice(0, 7);
  const max = rows.length ? rows[0][1] : 1;
  const wrap = document.getElementById('vertList');
  wrap.innerHTML = rows.map(([nome, v]) => `
    <div class="vbar-row">
      <div class="vbar-name" title="${nome}">${nome}</div>
      <div class="vbar-track"><div class="vbar-fill" data-w="${(v / max * 100).toFixed(1)}"></div></div>
      <div class="vbar-val">${fmtShort(v)}</div>
    </div>`).join('');
  requestAnimationFrame(() => requestAnimationFrame(() => {
    wrap.querySelectorAll('.vbar-fill').forEach(el => { el.style.width = el.dataset.w + '%'; });
  }));
}

function initials(nome) {
  return nome.split(/\s+/).filter(w => w.length > 2).slice(0, 2).map(w => w[0]).join('').toUpperCase() || nome.slice(0, 2).toUpperCase();
}

function renderClientes(list) {
  const rows = sumBy(list, 'cliente').slice(0, 6);
  const max = rows.length ? rows[0][1] : 1;
  const wrap = document.getElementById('cliList');
  wrap.innerHTML = rows.map(([nome, v]) => `
    <div class="cli-row">
      <div class="cli-avatar">${initials(nome)}</div>
      <div class="cli-info">
        <div class="cli-name" title="${nome}">${nome}</div>
        <div class="cli-bar"><span data-w="${(v / max * 100).toFixed(1)}"></span></div>
      </div>
      <div class="cli-val">${fmtShort(v)}</div>
    </div>`).join('');
  requestAnimationFrame(() => requestAnimationFrame(() => {
    wrap.querySelectorAll('.cli-bar span').forEach(el => { el.style.width = el.dataset.w + '%'; });
  }));
}

function renderAbc(list) {
  const { groups, total } = computeABC(list);
  const vals = ['A', 'B', 'C'].map(g => groups[g].reduce((s, [, v]) => s + v, 0));
  const cores = ['#1a944d', '#a4e845', 'rgba(234,245,238,.22)'];
  const ctx = document.getElementById('abcChart').getContext('2d');
  if (abcChart) abcChart.destroy();
  abcChart = new Chart(ctx, {
    type: 'doughnut',
    data: { labels: ['A', 'B', 'C'], datasets: [{
      data: vals,
      backgroundColor: cores,
      borderColor: '#0e1c15',
      borderWidth: 4,
      borderRadius: 8,
      hoverOffset: 8,
      hoverBorderColor: 'rgba(164,232,69,.5)'
    }]},
    options: {
      responsive: true,
      maintainAspectRatio: false,
      cutout: '72%',
      animation: reduceMotion ? false : { animateRotate: true, duration: 1100, easing: 'easeOutQuart' },
      plugins: {
        legend: { display: false },
        tooltip: {
          backgroundColor: '#132419',
          borderColor: 'rgba(164,232,69,.25)',
          borderWidth: 1,
          titleColor: '#eaf5ee',
          bodyColor: '#a4e845',
          padding: 12,
          cornerRadius: 12,
          displayColors: false,
          callbacks: { label: c => `Grupo ${c.label}: ${fmtBRL(c.parsed)}` }
        }
      }
    }
  });
  countUp(document.getElementById('abcCenter'), total, fmtShort);
  const rows = document.getElementById('abcRows');
  rows.innerHTML = ['A', 'B', 'C'].map((g, i) => {
    const pct = total > 0 ? vals[i] / total * 100 : 0;
    return `
    <div class="abc-row">
      <div class="abc-row-top">
        <span class="abc-dot" style="display:inline-block;width:8px;height:8px;border-radius:50%;background:${cores[i]};box-shadow:0 0 8px ${i < 2 ? 'var(--glow)' : 'transparent'};"></span>
        <b>Grupo ${g}</b>
        <span class="abc-row-n">${groups[g].length} cliente${groups[g].length === 1 ? '' : 's'}</span>
        <span class="abc-row-val">${fmtShort(vals[i])}</span>
        <span class="abc-row-pct">${pct.toFixed(1)}%</span>
      </div>
      <div class="abc-bar"><i data-w="${pct.toFixed(1)}" style="background:${i < 2 ? 'linear-gradient(90deg,var(--verde),var(--lima))' : 'rgba(234,245,238,.28)'};"></i></div>
    </div>`;
  }).join('');
  requestAnimationFrame(() => requestAnimationFrame(() => {
    rows.querySelectorAll('.abc-bar i').forEach(el => { el.style.width = el.dataset.w + '%'; });
  }));
  return { groups, total, vals };
}

function renderMacros(list) {
  const vAgg = sumBy(list, 'vertical');
  const cAgg = sumBy(list, 'cliente');
  const { groups, total } = computeABC(list);
  const fatA = groups.A.reduce((s, [, v]) => s + v, 0);
  const pctA = total > 0 ? fatA / total * 100 : 0;
  document.getElementById('macroVertVal').textContent = vAgg.length + ' verticais';
  document.getElementById('macroCliVal').textContent = cAgg.length + ' clientes';
  document.getElementById('macroAbcVal').textContent = pctA.toFixed(0) + '% no grupo A';
}

function renderTicker() {
  const totals = monthTotals();
  const items = totals.map(([m, v], i) => {
    if (i === 0) return `<span class="tick-item">${mesLabel(m)} <b>${fmtShort(v)}</b></span>`;
    const prev = totals[i - 1][1];
    const d = prev > 0 ? (v - prev) / prev * 100 : 0;
    const cls = d >= 0 ? 'tick-up' : 'tick-down';
    const arrow = d >= 0 ? '▲' : '▼';
    return `<span class="tick-item">${mesLabel(m)} <b>${fmtShort(v)}</b> <span class="${cls}">${arrow} ${Math.abs(d).toFixed(1)}%</span></span>`;
  });
  const best = totals.reduce((mx, c) => c[1] > mx[1] ? c : mx, ['', 0]);
  items.push(`<span class="tick-item">Melhor mês <b>${mesLabel(best[0])}</b> <span class="tick-up">${fmtShort(best[1])}</span></span>`);
  const total = totals.reduce((s, [, v]) => s + v, 0);
  items.push(`<span class="tick-item">Acumulado 2026 <b>${fmtShort(total)}</b></span>`);
  // Conteúdo duplicado para o loop infinito ser contínuo
  document.getElementById('tickerTrack').innerHTML = items.join('') + items.join('');
}

function renderSparks() {
  const totals = monthTotals();
  const byMonth = {};
  entries.forEach(e => {
    if (!byMonth[e.mes]) byMonth[e.mes] = { fat: 0, n: 0 };
    byMonth[e.mes].fat += Number(e.valor || 0);
    byMonth[e.mes].n += 1;
  });
  const meses = totals.map(([m]) => m);
  const series = {
    sparkFat: meses.map(m => byMonth[m].fat),
    sparkLanc: meses.map(m => byMonth[m].n)
  };
  Object.entries(series).forEach(([id, data]) => {
    const el = document.getElementById(id);
    if (!el || data.length < 2) return;
    const min = Math.min(...data), max = Math.max(...data);
    const span = max - min || 1;
    const pts = data.map((v, i) =>
      `${(i / (data.length - 1) * 100).toFixed(1)},${(25 - (v - min) / span * 22).toFixed(1)}`).join(' ');
    el.setAttribute('points', pts);
    if (!reduceMotion) {
      const len = el.getTotalLength();
      el.style.strokeDasharray = len;
      el.style.strokeDashoffset = len;
      el.style.transition = 'none';
      requestAnimationFrame(() => requestAnimationFrame(() => {
        el.style.transition = 'stroke-dashoffset 1.3s cubic-bezier(.3,.8,.3,1)';
        el.style.strokeDashoffset = '0';
      }));
    }
  });
}

function spawnParticles() {
  if (reduceMotion) return;
  const wrap = document.getElementById('finParticles');
  const chars = ['R$', '$', '◆', '●', 'R$', '$'];
  let html = '';
  for (let i = 0; i < 14; i++) {
    const size = 11 + Math.random() * 15;
    const left = Math.random() * 100;
    const dur = 16 + Math.random() * 16;
    const delay = -Math.random() * dur;
    html += `<span class="fin-p" style="left:${left.toFixed(1)}%;font-size:${size.toFixed(0)}px;animation-duration:${dur.toFixed(1)}s;animation-delay:${delay.toFixed(1)}s">${chars[i % chars.length]}</span>`;
  }
  wrap.innerHTML = html;
}

function initTilt() {
  if (reduceMotion || !window.matchMedia('(pointer: fine)').matches) {
    document.querySelectorAll('.card').forEach(c => c.classList.add('settled'));
    return;
  }
  document.querySelectorAll('.card').forEach(card => {
    // A animação de entrada pode já ter terminado antes deste listener existir
    const anims = card.getAnimations ? card.getAnimations() : [];
    if (anims.length === 0 || anims.every(a => a.playState === 'finished')) {
      card.classList.add('settled');
    } else {
      card.addEventListener('animationend', () => card.classList.add('settled'), { once: true });
      setTimeout(() => card.classList.add('settled'), 1600); // rede de segurança
    }
    card.addEventListener('pointermove', e => {
      if (!card.classList.contains('settled')) return;
      const r = card.getBoundingClientRect();
      const px = (e.clientX - r.left) / r.width - .5;
      const py = (e.clientY - r.top) / r.height - .5;
      card.style.setProperty('--ry', (px * 5).toFixed(2) + 'deg');
      card.style.setProperty('--rx', (-py * 5).toFixed(2) + 'deg');
      card.style.setProperty('--lift', '-4px');
    });
    card.addEventListener('pointerleave', () => {
      card.style.setProperty('--rx', '0deg');
      card.style.setProperty('--ry', '0deg');
      card.style.setProperty('--lift', '0px');
    });
  });
}

function burstParticles(card) {
  if (reduceMotion) return;
  for (let i = 0; i < 16; i++) {
    const p = document.createElement('span');
    p.className = 'mp';
    card.appendChild(p);
    const ang = Math.random() * 2 * Math.PI;
    const dist = 70 + Math.random() * 130;
    const dx = Math.cos(ang) * dist, dy = Math.sin(ang) * dist;
    requestAnimationFrame(() => requestAnimationFrame(() => {
      p.style.transform = `translate(${dx.toFixed(0)}px, ${dy.toFixed(0)}px) scale(0)`;
      p.style.opacity = '0';
    }));
    setTimeout(() => p.remove(), 900);
  }
}

function openMacroCard(card) {
  if (card.classList.contains('open')) return;
  burstParticles(card);
  card.classList.add('open');
}

function closeMacroCard(card) {
  card.classList.remove('open');
  const m = card.querySelector('.macro');
  // Reinicia o estado da animação de dissipação para a próxima abertura
  m.style.animation = 'none';
  void m.offsetWidth;
  m.style.animation = '';
}

function initMacros() {
  document.querySelectorAll('.has-macro .macro').forEach(m => {
    m.addEventListener('click', () => openMacroCard(m.closest('.card')));
  });
  document.querySelectorAll('.macro-restore').forEach(b => {
    b.addEventListener('click', e => {
      e.stopPropagation();
      closeMacroCard(document.getElementById(b.dataset.card));
    });
  });
}

function renderAll() {
  const list = filtered();
  renderPills();
  renderGauge(list);
  renderKpis(list);
  renderArea();
  renderVerticais(list);
  renderClientes(list);
  renderAbc(list);
  renderMacros(list);
  renderTicker();
  renderSparks();
  document.getElementById('subLine').textContent =
    (period === 'all' ? 'Todos os meses consolidados' : 'Referência ' + mesLabel(period)) + ' · Meireles & Freitas';
}

/* Ticks decorativos do dial */
(function drawTicks() {
  const g = document.getElementById('gaugeTicks');
  let html = '';
  for (let i = 0; i < 48; i++) {
    const a = i / 48 * 2 * Math.PI;
    const x1 = 125 + Math.cos(a) * 114, y1 = 125 + Math.sin(a) * 114;
    const x2 = 125 + Math.cos(a) * 119, y2 = 125 + Math.sin(a) * 119;
    html += `<line x1="${x1.toFixed(1)}" y1="${y1.toFixed(1)}" x2="${x2.toFixed(1)}" y2="${y2.toFixed(1)}"/>`;
  }
  g.innerHTML = html;
})();

/* ── Boot ──────────────────────────────── */
async function boot() {
  const { data: { session } } = await sb.auth.getSession();
  if (!session) { location.replace('index.html'); return; }
  try {
    await loadEntries();
    renderAll();
    initTilt();
    initMacros();
    spawnParticles();
  } catch (e) {
    console.error(e);
    document.getElementById('subLine').textContent = 'Erro ao carregar dados. Recarregue a página.';
  }
  document.getElementById('veil').classList.add('done');
}

document.getElementById('logoutBtn').addEventListener('click', async () => {
  await sb.auth.signOut();
  location.replace('index.html');
});
sb.auth.onAuthStateChange((ev) => { if (ev === 'SIGNED_OUT') location.replace('index.html'); });

boot();
</script>
